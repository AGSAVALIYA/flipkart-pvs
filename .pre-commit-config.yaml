# Pre-commit hooks configuration for Flipkart Product Verification System
# To install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=5000'] # Prevents accidentally committing files larger than 5MB (e.g. CSVs)
      - id: check-merge-conflict
      - id: check-json
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version matches pyproject.toml configuration
    rev: v0.4.10
    hooks:
      # Run the linter & auto-fix standard issues
      - id: ruff
        args: [ --fix ]
        files: ^backend/
      # Run the formatter
      - id: ruff-format
        files: ^backend/

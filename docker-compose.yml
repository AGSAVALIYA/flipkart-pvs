version: '3.8'

services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: flipkart_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: product_verification
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flipkart_admin -d product_verification"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://flipkart_admin:password123@db:5432/product_verification
      - DATABASE_URL_SYNC=postgresql://flipkart_admin:password123@db:5432/product_verification
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/workspace/uploads
      - IMAGE_DIR=/workspace/images
      - JWT_SECRET_KEY=dev-secret-key-change-in-production-immediately
      - ENABLE_RBAC=true
      - ENABLE_VISION_AI=false # Set to true and provide API key for Gemini Vision AI
      - AI_PROVIDER=gemini
      - AI_PROVIDER_API_KEY=
      - LOGFIRE_SERVICE_NAME=flipkart-pvs
      - LOGFIRE_ENVIRONMENT=development
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  storage_data:
